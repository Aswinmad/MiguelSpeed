<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>MiguelSpeed - Internet Speed Test</title>

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap">

  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0">
</head>

<body>

  <div class="bg-blobs">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
  </div>

  <header>

    <button id="logoBtn" class="logo-btn">
      <strong>MiguelSpeed</strong>
      <span> - Check Your Internet Speed</span>
    </button>

    <button id="themeBtn" class="theme-btn">
      <span class="material-symbols-outlined" id="themeIcon">
        routine
      </span>
    </button>

  </header>

  <main>

    <div class="screen active" id="screen-home">

      <h1>Check Your Internet Speed Precisely.</h1>

      <button id="startBtn" class="check-btn">
        Check Speed
      </button>

    </div>

    <div class="screen" id="screen-checking">

      <h2>Checking...</h2>

      <p id="phaseLabel" class="phase-label">
        (Download Speed)
      </p>

      <div id="liveSpeed" class="live-speed"></div>

      <div class="progress-wrap">
        <div id="progressBar" class="progress-bar"></div>
      </div>

    </div>

    <div class="screen" id="screen-results">

      <h2>Results</h2>

      <div class="cards">

        <div class="card glass">
          <div class="card-label">Download</div>

          <div class="card-main" id="dlMain">--</div>

          <div class="card-sub" id="dlSub"></div>

          <div class="rating" id="dlRating"></div>
        </div>

        <div class="card glass">
          <div class="card-label">Upload</div>

          <div class="card-main" id="ulMain">--</div>

          <div class="card-sub" id="ulSub"></div>

          <div class="rating" id="ulRating"></div>
        </div>

        <div class="card glass">
          <div class="card-label">Ping</div>

          <div class="card-main" id="pingMain">--</div>

          <div class="card-sub" id="pingSub"></div>

          <div class="rating" id="pingRating"></div>
        </div>

      </div>

      <button id="retestBtn" class="retest-btn">
        Re-test
      </button>

      <div class="history-wrap">

        <div class="history-title">
          Previous Results
        </div>

        <div id="historyList" class="history-list"></div>

      </div>

    </div>

  </main>

  <div id="toast" class="toast"></div>

  <script src="script.js"></script>

</body>
</html>
